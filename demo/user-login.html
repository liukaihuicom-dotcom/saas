<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Broker SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="snowui-styles.css">
    <style>
        body {
            background: var(--snow-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border: 1px solid var(--snow-border);
            border-radius: var(--snow-radius-xl);
            box-shadow: var(--snow-shadow-md);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4361ee, #7c3aed);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--snow-text);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .login-subtitle {
            font-size: 13.5px;
            color: var(--snow-text-muted);
            margin-bottom: 28px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--snow-text-secondary);
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            padding: 9px 12px 9px 38px;
            border: 1px solid var(--snow-border);
            border-radius: var(--snow-radius-sm);
            font-size: 13.5px;
            color: var(--snow-text);
            background: white;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }
        .input-wrap input:focus {
            border-color: var(--snow-primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        .input-wrap input::placeholder { color: var(--snow-text-muted); }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--snow-text-muted);
            font-size: 13px;
        }
        .input-action {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--snow-text-muted);
            cursor: pointer;
            font-size: 13px;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--snow-primary);
            color: white;
            border: none;
            border-radius: var(--snow-radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: #3451d1;
            box-shadow: 0 4px 12px rgba(67,97,238,0.3);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider-line { flex: 1; height: 1px; background: var(--snow-border); }
        .divider-text { font-size: 12px; color: var(--snow-text-muted); }
        .oauth-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 9px;
            border: 1px solid var(--snow-border);
            border-radius: var(--snow-radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--snow-text-secondary);
            cursor: pointer;
            background: white;
            transition: all 0.15s;
            font-family: inherit;
        }
        .oauth-btn:hover {
            border-color: #cbd5e1;
            background: var(--snow-bg);
        }
        .tab-switch {
            display: flex;
            background: var(--snow-bg);
            border-radius: var(--snow-radius-sm);
            padding: 3px;
            margin-bottom: 24px;
        }
        .tab-item {
            flex: 1;
            padding: 7px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--snow-text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tab-item.active {
            background: white;
            color: var(--snow-text);
            font-weight: 600;
            box-shadow: var(--snow-shadow-sm);
        }
        .forgot-link {
            font-size: 12.5px;
            color: var(--snow-primary);
            text-align: right;
            display: block;
            margin-top: -10px;
            margin-bottom: 16px;
        }
        .signup-prompt {
            text-align: center;
            font-size: 13px;
            color: var(--snow-text-muted);
            margin-top: 24px;
        }
        .signup-prompt a { color: var(--snow-primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container snow-fade-up">

    <!-- Logo -->
    <div class="login-logo">
        <div class="logo-icon"><i class="fas fa-snowflake"></i></div>
        <span style="font-size:16px;font-weight:700;color:var(--snow-text)">Broker SaaS</span>
    </div>

    <!-- 标签页切换 -->
    <div class="tab-switch">
        <div class="tab-item active" onclick="switchTab('login',this)">登录</div>
        <div class="tab-item" onclick="switchTab('register',this)">注册</div>
    </div>

    <!-- 登录面板 -->
    <div id="loginPanel">
        <div class="login-title">欢迎回来</div>
        <div class="login-subtitle">登录您的交易账户</div>

        <div class="form-group">
            <label class="form-label">邮箱地址</label>
            <div class="input-wrap">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" placeholder="your@email.com">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="loginPass" placeholder="输入密码">
                <i class="fas fa-eye input-action" onclick="togglePass('loginPass',this)"></i>
            </div>
        </div>

        <a href="#" class="forgot-link">忘记密码？</a>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
            <input type="checkbox" id="remember" style="accent-color:var(--snow-primary);width:14px;height:14px">
            <label for="remember" style="font-size:13px;color:var(--snow-text-secondary);cursor:pointer">记住我</label>
        </div>

        <button class="login-btn" onclick="doLogin()">登录</button>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">或使用以下方式</span>
            <div class="divider-line"></div>
        </div>

        <div class="oauth-btns">
            <button class="oauth-btn">
                <i class="fab fa-weixin" style="color:#07c160;font-size:16px"></i>微信登录
            </button>
            <button class="oauth-btn">
                <i class="fab fa-google" style="color:#ea4335;font-size:16px"></i>Google
            </button>
        </div>

        <div class="signup-prompt">
            还没有账户？ <a href="#" onclick="switchTabByName('register')">立即注册</a>
        </div>
    </div>

    <!-- 注册面板 -->
    <div id="registerPanel" style="display:none">
        <div class="login-title">创建账户</div>
        <div class="login-subtitle">开始您的交易之旅</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
            <div class="form-group" style="margin:0">
                <label class="form-label">姓</label>
                <div class="input-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" placeholder="Liu">
                </div>
            </div>
            <div class="form-group" style="margin:0">
                <label class="form-label">名</label>
                <div class="input-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" placeholder="Kaihui">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">邮箱地址</label>
            <div class="input-wrap">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" placeholder="your@email.com">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">手机号码</label>
            <div style="display:flex;gap:8px">
                <select style="padding:9px 8px;border:1px solid var(--snow-border);border-radius:var(--snow-radius-sm);font-size:13px;color:var(--snow-text);background:white;outline:none;font-family:inherit;cursor:pointer;flex-shrink:0">
                    <option>+86</option>
                    <option>+852</option>
                    <option>+1</option>
                    <option>+44</option>
                </select>
                <div class="input-wrap" style="flex:1">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" placeholder="138 0000 0000">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">设置密码</label>
            <div class="input-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="regPass" placeholder="至少8位，含字母和数字">
                <i class="fas fa-eye input-action" onclick="togglePass('regPass',this)"></i>
            </div>
            <div id="passStrength" style="height:4px;background:var(--snow-bg);border-radius:2px;margin-top:6px;overflow:hidden">
                <div id="passBar" style="height:100%;width:0;background:var(--snow-success);transition:width 0.3s,background 0.3s;border-radius:2px"></div>
            </div>
            <span id="passHint" style="font-size:11.5px;color:var(--snow-text-muted);margin-top:3px;display:block"></span>
        </div>

        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:20px">
            <input type="checkbox" id="agree" style="accent-color:var(--snow-primary);width:14px;height:14px;margin-top:2px">
            <label for="agree" style="font-size:12.5px;color:var(--snow-text-muted);cursor:pointer;line-height:1.5">
                我已阅读并同意 <a href="#" style="color:var(--snow-primary)">服务条款</a> 和 <a href="#" style="color:var(--snow-primary)">隐私政策</a>
            </label>
        </div>

        <button class="login-btn" onclick="doRegister()">创建账户</button>

        <div class="signup-prompt">
            已有账户？ <a href="#" onclick="switchTabByName('login')">立即登录</a>
        </div>
    </div>

</div>

<script>
function switchTab(name, el) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('loginPanel').style.display = name === 'login' ? 'block' : 'none';
    document.getElementById('registerPanel').style.display = name === 'register' ? 'block' : 'none';
}

function switchTabByName(name) {
    const tabs = document.querySelectorAll('.tab-item');
    if (name === 'login') switchTab('login', tabs[0]);
    else switchTab('register', tabs[1]);
}

function togglePass(id, icon) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

// 密码强度
document.getElementById('regPass')?.addEventListener('input', function() {
    const v = this.value;
    const bar = document.getElementById('passBar');
    const hint = document.getElementById('passHint');
    let strength = 0;
    if (v.length >= 8) strength++;
    if (/[A-Z]/.test(v)) strength++;
    if (/[0-9]/.test(v)) strength++;
    if (/[^a-zA-Z0-9]/.test(v)) strength++;
    const levels = ['', '弱', '一般', '较强', '强'];
    const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
    const widths = ['0%', '25%', '50%', '75%', '100%'];
    bar.style.width = widths[strength];
    bar.style.background = colors[strength];
    hint.textContent = strength > 0 ? '密码强度：' + levels[strength] : '';
    hint.style.color = colors[strength];
});

function doLogin() {
    const btn = event.target;
    btn.textContent = '登录中...';
    btn.disabled = true;
    setTimeout(() => {
        window.location.href = 'user-dashboard.html';
    }, 800);
}

function doRegister() {
    const btn = event.target;
    btn.textContent = '创建中...';
    btn.disabled = true;
    setTimeout(() => {
        alert('注册成功！正在跳转...');
        window.location.href = 'user-kyc.html';
    }, 800);
}
</script>
</body>
</html>
